<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - College Hub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <!-- Page-specific small tweaks removed; using centralized stylesheet -->
</head>
<body>



<!-- Navbar -->
<nav class="navbar">
  <div class="nav-container">
    <div class="nav-logo">
      <a href="/index.html"><i class="fas fa-graduation-cap"></i> Campus Hub</a>
    </div>
    <ul class="nav-menu">
      <li class="nav-item"><a href="/index.html" class="nav-link"><i class="fas fa-home"></i> Home</a></li>
    </ul>
  </div>
</nav>

<!-- Content Container -->
<div class="dashboard-container">
  <div class="welcome-bar">
    <div><i class="fas fa-wave-square"></i> Hello, <strong id="userEmailDisplay"></strong></div>
    <button class="logout-btn" id="logoutBtnSecondary">
      <i class="fas fa-sign-out-alt"></i> Logout
    </button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('lost')">
      <i class="fas fa-search"></i> Lost & Found
    </button>
    <button class="tab-btn" onclick="switchTab('marketplace')">
      <i class="fas fa-shopping-cart"></i> Marketplace
    </button>
    <button class="tab-btn" onclick="switchTab('papers')">
      <i class="fas fa-file-alt"></i> Exam Papers
    </button>
    <button class="tab-btn" onclick="switchTab('announcements')">
      <i class="fas fa-bullhorn"></i> Announcements
    </button>
  </div>
  
  <div id="postsContainer"></div>
  <div id="emptyMessage" class="empty-message">
    <i class="fas fa-inbox"></i>
    <h3>No posts found</h3>
    <p>You haven't created any posts in this category yet.</p>
  </div>
</div>

<!-- Auth script -->
<script src="/auth-check.js"></script>

<!-- Main dashboard logic -->
<script>
  // Change this to your deployed backend URL!
  const API_BASE_URL = '/api';
  let activeTab = 'lost';
  let userEmail = '';

  window.addEventListener('DOMContentLoaded', async () => {
    // Wait until authManager is ready
    while (typeof window.authManager === 'undefined' || window.authManager.user === null) {
      await new Promise(resolve => setTimeout(resolve, 100));
    }

    if (!authManager.isLoggedIn()) {
      alert('Login required!');
      window.location.href = '/login.html';
      return;
    }

    const user = authManager.getCurrentUser();
    userEmail = user.email;
    document.getElementById('userEmailDisplay').textContent = userEmail;

    fetchPosts();
  });

  const tabs = document.querySelectorAll('.tab-btn');

  async function fetchPosts() {
    const container = document.getElementById('postsContainer');
    const empty = document.getElementById('emptyMessage');
    container.innerHTML = '<div class="loading">Loading posts</div>';
    empty.style.display = 'none';

    try {
      let url = '';
      if (activeTab === 'lost') {
        url = `${API_BASE_URL}/lostfound/my-items`;
      } else if (activeTab === 'marketplace') {
        url = `${API_BASE_URL}/marketplace`;
      } else if (activeTab === 'papers') {
        url = `${API_BASE_URL}/papers`;
      } else if (activeTab === 'announcements') {
        url = `${API_BASE_URL}/announcements`;
      }

      const res = await fetch(url);
      if (!res.ok) throw new Error('Failed to fetch posts');
      const data = await res.json();
      const posts = data.items || data.data || data;

      // Filter posts of this user except for lost (which already has user filter)
      const filtered = (activeTab === 'announcements' || activeTab === 'papers' || activeTab === 'marketplace')
        ? posts.filter(p => p.postedByEmail === userEmail)
        : posts;

      renderPosts(filtered);
    } catch (error) {
      console.error('Post fetch error:', error);
      container.innerHTML = '<div class="post" style="color:red; text-align:center;"><i class="fas fa-exclamation-triangle"></i> Failed to load posts. Please try again.</div>';
    }
  }

  function renderPosts(posts) {
    const container = document.getElementById('postsContainer');
    const empty = document.getElementById('emptyMessage');
    container.innerHTML = '';
    empty.style.display = posts.length === 0 ? 'block' : 'none';

    posts.forEach(post => {
      const div = document.createElement('div');
      div.className = 'post';
      div.setAttribute('data-type', activeTab);
      let content = '';

      if (activeTab === 'lost') {
        content = `
          <h3><i class="fas fa-search"></i> ${escapeHtml(post.name)}</h3>
          <p><strong><i class="fas fa-info-circle"></i> Description:</strong> ${escapeHtml(post.description)}</p>
          <p><strong><i class="fas fa-map-marker-alt"></i> Location:</strong> ${escapeHtml(post.location)}</p>
          <p><strong><i class="fas fa-tag"></i> Type:</strong> <span style="text-transform: capitalize;">${escapeHtml(post.type)}</span></p>
          ${post.imageUrl ? `<img src="${post.imageUrl}" alt="Lost & Found Image" />` : ''}
          <p><small><i class="fas fa-calendar-alt"></i> Posted on: ${new Date(post.date).toLocaleString()}</small></p>
          <button class="delete-btn" onclick="deletePost('${post._id}', 'lost')">
            <i class="fas fa-trash-alt"></i> Delete
          </button>
        `;
      } else if (activeTab === 'marketplace') {
        content = `
          <h3><i class="fas fa-shopping-bag"></i> ${escapeHtml(post.itemName)}</h3>
          <p><strong><i class="fas fa-tags"></i> Category:</strong> ${escapeHtml(post.itemCategory)}</p>
          <p><strong><i class="fas fa-rupee-sign"></i> Price:</strong> ₹${post.itemPrice.toFixed(2)}</p>
          ${post.imageUrl ? `<img src="${post.imageUrl}" alt="Marketplace Item Image" />` : ''}
          <p><small><i class="fas fa-calendar-alt"></i> Posted: ${new Date(post.createdAt).toLocaleString()}</small></p>
          <button class="delete-btn" onclick="deletePost('${post._id}', 'marketplace')">
            <i class="fas fa-trash-alt"></i> Delete
          </button>
        `;
      } else if (activeTab === 'papers') {
        content = `
          <h3><i class="fas fa-file-pdf"></i> ${escapeHtml(post.subject)} - Semester ${post.semester}, ${post.year}</h3>
          <p><strong><i class="fas fa-user"></i> Uploaded by:</strong> ${escapeHtml(post.uploadedBy)}</p>
          <p><strong><i class="fas fa-paperclip"></i> File:</strong></p>
          <a href="${post.fileName}" target="_blank" rel="noopener noreferrer" class="external-link">
            <i class="fas fa-external-link-alt"></i> ${escapeHtml(post.originalName)}
          </a>
          <p><small><i class="fas fa-calendar-alt"></i> ${new Date(post.datePosted).toLocaleString()}</small></p>
          <button class="delete-btn" onclick="deletePost('${post._id}', 'papers')">
            <i class="fas fa-trash-alt"></i> Delete
          </button>
        `;
      } else if (activeTab === 'announcements') {
        content = `
          <h3><i class="fas fa-megaphone"></i> ${escapeHtml(post.title)}</h3>
          <div class="description">${escapeHtml(post.content || '')}</div>
          ${post.fileUrl ? `<p><strong><i class="fas fa-paperclip"></i> Attachment:</strong></p>
          <a href="${post.fileUrl}" target="_blank" rel="noopener noreferrer" class="external-link">
            <i class="fas fa-paperclip"></i> View Attachment
          </a>` : ''}
          <p><small><i class="fas fa-user"></i> Posted by: ${escapeHtml(post.postedByName)}</small></p>
          <p><small><i class="fas fa-calendar-alt"></i> ${new Date(post.datePosted).toLocaleString()}</small></p>
          <button class="delete-btn" onclick="deletePost('${post._id}', 'announcements')">
            <i class="fas fa-trash-alt"></i> Delete
          </button>
        `;
      }

      div.innerHTML = content;
      container.appendChild(div);
    });
  }

  async function deletePost(id, type) {
    if (!confirm('Are you sure you want to delete this post? This action cannot be undone.')) return;

    try {
      const endpoint =
        type === 'lost' ? `${API_BASE_URL}/lostfound/${id}` :
        type === 'marketplace' ? `${API_BASE_URL}/marketplace/${id}` :
        type === 'papers' ? `${API_BASE_URL}/papers/${id}` :
        `${API_BASE_URL}/announcements/${id}`;

      const res = await fetch(endpoint, { 
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userEmail: userEmail })
      });

      const result = await res.json();

      if (!res.ok) throw new Error(result.error || 'Delete failed');

      alert('Post deleted successfully');
      fetchPosts();
    } catch (err) {
      alert(`Failed to delete: ${err.message}`);
    }
  }

  function switchTab(tab) {
    activeTab = tab;
    tabs.forEach(btn => btn.classList.remove('active'));
    document.querySelector(`.tab-btn[onclick*="'${tab}'"]`).classList.add('active');
    fetchPosts();
  }

  // Simple HTML escape helper to prevent XSS in UI
  function escapeHtml(text) {
    if (!text) return '';
    return text.replace(/[&<>"']/g, function(m) {
      switch (m) {
        case '&': return '&amp;';
        case '<': return '&lt;';
        case '>': return '&gt;';
        case '"': return '&quot;';
        case "'": return '&#39;';
        default: return m;
      }
    });
  }
</script>

</body>
</html>
