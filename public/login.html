<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header>
    <div class="container">
      <h1>College Community</h1>
    </div>
  </header>
  <nav>
    <ul>
      <li><a href="/index.html">Home</a></li>
      <li><a href="/announcements.html">Announcements</a></li>
      <li><a href="/exams.html">Exams</a></li>
      <li><a href="/marketplace.html">Marketplace</a></li>
      <li><a href="/lost-found.html">Lost & Found</a></li>
      <li><a href="/dashboard.html">Dashboard</a></li>
    </ul>
  </nav>

  <main class="container" style="padding:40px 0;">
    <section class="section-title">
      <h2>Login</h2>
    </section>

    <div style="display:flex; justify-content:center; margin-top:20px;">
      <a class="btn" href="/auth/google">Sign in with Google</a>
    </div>

    <div id="errorMessage" style="color: var(--danger-color); text-align:center; margin-top:12px;"></div>
  </main>

  <footer>
    <div class="container footer-content">
      <div class="footer-column">
        <h3>About</h3>
        <p>Connecting students and faculty.</p>
      </div>
    </div>
    <div style="text-align:center; padding-bottom: 20px;">&copy; College Community</div>
  </footer>

  <script src="/auth-check.js"></script>
  <script>
    // Show error if ?error=auth_error present
    const urlParams = new URLSearchParams(window.location.search);
    const err = urlParams.get('error');
    if (err === 'auth_error') {
      document.getElementById('errorMessage').textContent = 'Authentication failed. Please try again.';
    }
  </script>
</body>
</html>
