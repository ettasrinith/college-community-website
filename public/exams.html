<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exam Papers</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header>
    <div class="container">
      <h1>College Community</h1>
    </div>
  </header>
  <nav>
    <ul>
      <li><a href="/index.html">Home</a></li>
      <li><a href="/announcements.html">Announcements</a></li>
      <li><a href="/exams.html">Exams</a></li>
      <li><a href="/marketplace.html">Marketplace</a></li>
      <li><a href="/lost-found.html">Lost & Found</a></li>
      <li><a href="/dashboard.html">Dashboard</a></li>
    </ul>
    <div class="login-container">
      <div class="user-dropdown" id="userDropdown">
        <button class="user-btn" id="userBtn">Account</button>
        <div class="dropdown-content" id="userMenu">
          <a href="/dashboard.html">Dashboard</a>
          <a href="#" id="logoutBtn">Logout</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="container">
    <section class="section-title">
      <h2>Exam Papers</h2>
    </section>

    <section id="examsList"></section>
  </main>

  <footer>
    <div class="container footer-content">
      <div class="footer-column">
        <h3>About</h3>
        <p>Connecting students and faculty.</p>
      </div>
      <div class="footer-column">
        <h3>Contact</h3>
        <ul>
          <li>Email: admin@example.com</li>
        </ul>
      </div>
    </div>
    <div style="text-align:center; padding-bottom: 20px;">&copy; College Community</div>
  </footer>

  <script src="/auth-check.js"></script>
  <script>
    async function loadExams() {
      try {
        const res = await fetch('/api/exampapers');
        const list = await res.json();
        const container = document.getElementById('examsList');
        container.innerHTML = list.map(e => {
          return `<article style="margin-bottom:20px; padding:16px; background:white; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.05);">
            <h3>${escapeHtml(e.title)}</h3>
            <p>${escapeHtml(e.description)}</p>
            <a class="btn" href="/api/exampapers/download/${encodeURIComponent(e._id)}">Download</a>
          </article>`;
        }).join('');
      } catch (err) {
        console.error('Error loading exams', err);
      }
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>"]+/g, function (s) {
        return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]);
      });
    }

    loadExams();
  </script>
</body>
</html>
